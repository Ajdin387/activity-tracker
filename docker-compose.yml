services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: activitydb
      POSTGRES_USER: activity
      POSTGRES_PASSWORD: activity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
